<!DOCTYPE html>
<html>
<head>
    <title>Employee Attrition Analytics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="hero">
    <h1>Employee Attrition Prediction Dashboard</h1>
    <p>Analyze HR data, view attrition insights, and predict whether an employee may leave.</p>

    <div class="buttons">
        <a href="/dashboard">View Dashboard</a>
        <a href="/predict">Predict Attrition</a>
    </div>
</div>
<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

document.addEventListener("DOMContentLoaded", function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
    }

    const forms = document.querySelectorAll("form");
    const loader = document.getElementById("pageLoader");

    forms.forEach(form => {
        form.addEventListener("submit", function () {
            if (loader) {
                loader.style.display = "flex";
            }
        });
    });
});
</script>
</body>
<div id="pageLoader" class="page-loader">
    <div class="loader-box">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>
</div>
</html>
